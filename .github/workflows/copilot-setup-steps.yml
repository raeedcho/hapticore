name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
    
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libzmq3-dev xvfb libsdl2-2.0-0 libglu1-mesa libgl1-mesa-dri
    
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true

      - name: Install PsychoPy (no-deps)
        run: pixi run install-psychopy
        
      - name: Build C++ haptic server (mock)
        run: |
          pixi run -- bash -c 'cd cpp/haptic_server && cmake --preset ci && cmake --build --preset ci'
