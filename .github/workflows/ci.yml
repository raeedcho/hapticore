name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true

      - name: Lint with ruff
        run: pixi run lint

      - name: Type check with mypy
        run: pixi run typecheck

      - name: Run unit tests
        run: pixi run test-unit

      - name: Run integration tests
        run: pixi run test-integration

  test-cpp:
    name: C++ haptic_server tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install libzmq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libzmq3-dev

      - name: Install libzmq (macOS)
        if: runner.os == 'macOS'
        run: brew install zeromq

      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true

      - name: Configure
        run: pixi run -- cmake --preset ci
        working-directory: cpp/haptic_server

      - name: Build
        run: pixi run -- cmake --build --preset ci
        working-directory: cpp/haptic_server

      - name: Test
        run: pixi run -- ctest --preset ci
        working-directory: cpp/haptic_server

      - name: Smoke test
        run: pixi run -- cpp/haptic_server/build/ci/haptic_server --help

  test-cpp-tsan:
    name: C++ ThreadSanitizer
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install libzmq
        run: sudo apt-get update && sudo apt-get install -y libzmq3-dev

      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true

      - name: Configure
        run: pixi run -- cmake --preset tsan
        working-directory: cpp/haptic_server

      - name: Build
        run: pixi run -- cmake --build --preset tsan
        working-directory: cpp/haptic_server

      - name: Test
        run: pixi run -- ctest --preset tsan
        working-directory: cpp/haptic_server

  test-cross-language:
    name: Cross-language serialization
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install libzmq
        run: sudo apt-get update && sudo apt-get install -y libzmq3-dev

      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true
      - name: Build C++ (mock)
        run: |
          pixi run -- bash -c 'cd cpp/haptic_server && cmake --preset ci && cmake --build --preset ci'

      - name: Run cross-language test
        run: pixi run -- pytest tests/integration/test_cross_language.py -v

  test-display:
    name: Display tests (Linux xvfb)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true
          environments: display

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb libsdl2-2.0-0 libglu1-mesa libgl1-mesa-dri

      - name: Install PsychoPy (no-deps)
        run: pixi run -e display install-psychopy

      - name: Run unit tests under xvfb
        run: xvfb-run -a pixi run -e display test-unit

      - name: Run display tests under xvfb
        run: xvfb-run -a -s "-screen 0 1920x1080x24" pixi run -e display test-display

  firmware-build:
    name: Teensy firmware compile
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile firmware for Teensy 4.1
        run: pixi run -- pio run -e teensy41
        working-directory: firmware/teensy

      - name: Run host-side parser tests
        run: pixi run -- pio test -e native -f test_parser
        working-directory: firmware/teensy
        # Allow this step to fail without failing the job. Parser tests are
        # nice-to-have; the compile-check above is the hard requirement.
        continue-on-error: true