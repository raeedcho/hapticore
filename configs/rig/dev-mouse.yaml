# Laptop development — mouse-driven haptic via mock C++ server.
# Run with: hapticore run --rig configs/rig/dev-mouse.yaml \
#                         --subject ... --task ...
#
# The factory auto-starts the mock haptic server and a MouseBridge
# thread that forwards mouse position from the PsychoPy window to
# the server as set_mock_position / set_mock_velocity commands.

haptic:
  backend: dhd
  dhd:
    auto_start: true
    server_binary: cpp/haptic_server/build/dev-mock/haptic_server
    mouse_input: true

display:
  backend: psychopy  # mouse_input requires the real PsychoPy window
  resolution: [1280, 800]
  refresh_rate_hz: 60
  monitor_distance_cm: 50.0
  background_color: [0.0, 0.0, 0.0]
  photodiode_enabled: false
  mirror_horizontal: false

recording:
  save_dir: "data"
  lsl_enabled: false

sync:
  backend: "mock"
  sync_pulse_rate_hz: 1.0
  code_map:
    state_codes: {}
    event_codes: {}

zmq:
  event_pub_address: "ipc:///tmp/hapticore_dev_events"
  haptic_state_address: "ipc:///tmp/hapticore_dev_haptic_state"
  haptic_command_address: "ipc:///tmp/hapticore_dev_haptic_cmd"
  transport: "ipc"
