# Rig 2 — real delta.3 haptic rig with two monitors
# This config drives sessions against the actual hardware. Do not use on
# a laptop; it assumes the C++ haptic server is running.

haptic:
  kind: dhd  # HapticClient connects to the C++ haptic server over ZMQ
  # Physical rig parameters (currently for human reference; Python code
  # does not yet flow these into the C++ server — tracked separately).
  workspace_bounds:
    x: [-0.15, 0.15]
    y: [-0.15, 0.15]
    z: [-0.15, 0.15]
  force_limit_n: 20.0
  publish_rate_hz: 200.0
  # Optional: tune heartbeat/timeout; defaults are fine for local IPC.
  # dhd:
  #   heartbeat_interval_s: 0.2
  #   command_timeout_ms: 1000

display:
  resolution: [1920, 1080]
  refresh_rate_hz: 60
  fullscreen: true
  monitor_distance_cm: 50.0
  background_color: [0.0, 0.0, 0.0]
  # Multi-monitor rig: pick the monitor the subject views.
  # Run 'pixi run -e display hapticore list-screens' to enumerate.
  screen: 0
  # Horizontal mirror compensates for a canted mirror that reflects
  # the image left-right before it reaches the subject's eyes.
  mirror_horizontal: false
  mirror_vertical: false

recording:
  save_dir: "data"
  lsl_enabled: true
  # ripple:  # enable Ripple recording by adding a block like:
  #   use_tcp: true
  #   operator_id: 129
  #   auto_increment: true

sync:
  transport: "mock"  # one of: mock | teensy
  sync_pulse_rate_hz: 1.0
  code_map:
    state_codes: {}
    event_codes: {}
  # teensy:
  #   port: "/dev/ttyACM0"
  #   baud: 115200

zmq:
  event_pub_address: "ipc:///tmp/hapticore_events"
  haptic_state_address: "ipc:///tmp/hapticore_haptic_state"
  haptic_command_address: "ipc:///tmp/hapticore_haptic_cmd"
  transport: "ipc"
