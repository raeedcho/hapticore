# Example Hapticore experiment configuration
# All fields with defaults can be omitted; required fields are marked below.

experiment_name: "center_out_reaching"  # required

subject:  # required
  subject_id: "monkey_M"  # required
  species: "macaque"
  implant_info:
    array_type: "utah"
    hemisphere: "left"
    area: "M1"

haptic:
  server_address: "localhost"
  workspace_bounds:
    x: [-0.15, 0.15]
    y: [-0.15, 0.15]
    z: [-0.15, 0.15]
  force_limit_n: 20.0
  publish_rate_hz: 200.0

display:
  backend: mock
  resolution: [1920, 1080]
  refresh_rate_hz: 60
  fullscreen: true
  monitor_distance_cm: 50.0
  background_color: [0.0, 0.0, 0.0]

recording:
  save_dir: "data"
  lsl_enabled: true

sync:
  backend: "mock"
  sync_pulse_rate_hz: 1.0
  code_map:
    state_codes: {}
    event_codes: {}

task:  # required
  task_class: "hapticore.tasks.center_out.CenterOutTask"  # required
  params:
    num_targets: 8
    target_distance: 0.08
    target_radius: 0.010
    hold_time: 0.5
    reach_timeout: 2.0
    iti_duration: 1.0
  conditions:
    - target_id: 0
      target_position: [0.08, 0.0]
    - target_id: 1
      target_position: [0.0566, 0.0566]
    - target_id: 2
      target_position: [0.0, 0.08]
    - target_id: 3
      target_position: [-0.0566, 0.0566]
    - target_id: 4
      target_position: [-0.08, 0.0]
    - target_id: 5
      target_position: [-0.0566, -0.0566]
    - target_id: 6
      target_position: [0.0, -0.08]
    - target_id: 7
      target_position: [0.0566, -0.0566]
  block_size: 8
  num_blocks: 1
  randomization: "pseudorandom"

zmq:
  event_pub_address: "ipc:///tmp/hapticore_events"
  haptic_state_address: "ipc:///tmp/hapticore_haptic_state"
  haptic_command_address: "ipc:///tmp/hapticore_haptic_cmd"
  transport: "ipc"
