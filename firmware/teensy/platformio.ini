; PlatformIO project for the Hapticore Teensy 4.1 sync hub firmware.
; See firmware/teensy/README.md for build and flash instructions.

[platformio]
default_envs = teensy41

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
build_flags =
    -Wall
    -Wextra
    -Werror
    -std=gnu++17
upload_protocol = teensy-cli
monitor_speed = 115200

[env:native]
; Host-side parser tests. Optional; if this environment fails to build on
; your machine, rely on the teensy41 env's compile-check via CI.
platform = native
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
test_framework = unity
