# Default rig configuration
# Contains hardware-specific settings: haptic workspace, display, ZMQ addresses, sync

haptic:
  server_address: "localhost"
  workspace_bounds:
    x: [-0.15, 0.15]
    y: [-0.15, 0.15]
    z: [-0.15, 0.15]
  force_limit_n: 20.0
  publish_rate_hz: 200.0

display:
  resolution: [1920, 1080]
  refresh_rate_hz: 60
  fullscreen: true
  monitor_distance_cm: 50.0
  background_color: [0.0, 0.0, 0.0]

recording:
  save_dir: "data"
  lsl_enabled: true
  # ripple:  # enable Ripple recording by adding a block like:
  #   use_tcp: true
  #   operator_id: 129
  #   auto_increment: true

sync:
  transport: "mock"  # one of: mock | teensy
  sync_pulse_rate_hz: 1.0
  code_map:
    state_codes: {}
    event_codes: {}
  # teensy:
  #   port: "/dev/ttyACM0"
  #   baud: 115200

zmq:
  event_pub_address: "ipc:///tmp/hapticore_events"
  haptic_state_address: "ipc:///tmp/hapticore_haptic_state"
  haptic_command_address: "ipc:///tmp/hapticore_haptic_cmd"
  transport: "ipc"
