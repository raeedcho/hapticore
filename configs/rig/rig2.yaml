# Rig 2 — real delta.3 haptic rig with two monitors
# This config drives sessions against the actual hardware. The haptic
# server is auto-started by default (see haptic.dhd notes below).

haptic:
  backend: dhd  # HapticClient connects to the C++ haptic server over ZMQ
  dhd:
    # auto_start defaults to True: hapticore probes the configured ZMQ
    # state address on startup. If a server is already running, the
    # factory attaches and leaves it running on exit. If not, the
    # factory spawns one from server_binary, passing force_limit_n and
    # publish_rate_hz through as --force-limit / --pub-rate, and
    # cleanly terminates it on exit.
    #
    # For long-lived sessions where you want the server to outlive any
    # individual `hapticore run` (e.g. iterating on task code without
    # re-paying calibration on every run), launch the binary once
    # manually; subsequent runs will attach.
    server_binary: cpp/haptic_server/build/dhd/haptic_server
    force_limit_n: 20.0
    publish_rate_hz: 200.0
    # Optional: tune heartbeat/timeout; defaults are fine for local IPC.
    heartbeat_interval_s: 0.2
    command_timeout_ms: 1000

display:
  backend: psychopy  # real PsychoPy window for the rig monitor
  resolution: [1920, 1080]
  refresh_rate_hz: 60
  fullscreen: true
  monitor_distance_cm: 50.0
  background_color: [0.0, 0.0, 0.0]
  # Multi-monitor rig: pick the monitor the subject views.
  # Run 'pixi run hapticore list-screens' to enumerate.
  screen: 0
  # Horizontal mirror compensates for a canted mirror that reflects
  # the image left-right before it reaches the subject's eyes.
  mirror_horizontal: false
  mirror_vertical: false

recording:
  save_dir: "data"
  lsl_enabled: true
  # ripple:  # enable Ripple recording by adding a block like:
  #   use_tcp: true
  #   operator_id: 129
  #   auto_increment: true

sync:
  backend: "mock"  # one of: mock | teensy
  sync_pulse_rate_hz: 1.0
  code_map:
    state_codes: {}
    event_codes: {}
  # teensy:
  #   port: "/dev/ttyACM0"
  #   baud: 115200

zmq:
  event_pub_address: "ipc:///tmp/hapticore_events"
  haptic_state_address: "ipc:///tmp/hapticore_haptic_state"
  haptic_command_address: "ipc:///tmp/hapticore_haptic_cmd"
  transport: "ipc"
