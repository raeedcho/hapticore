# Example Hapticore experiment configuration
# All fields with defaults can be omitted; required fields are marked below.

experiment_name: "center_out_reaching"  # required

subject:  # required
  subject_id: "monkey_M"  # required
  species: "macaque"
  implant_info:
    array_type: "utah"
    hemisphere: "left"
    area: "M1"

haptic:
  server_address: "localhost"
  workspace_bounds:
    x: [-0.15, 0.15]
    y: [-0.15, 0.15]
    z: [-0.15, 0.15]
  force_limit_n: 20.0
  publish_rate_hz: 200.0

display:
  resolution: [1920, 1080]
  refresh_rate_hz: 60
  fullscreen: true
  monitor_distance_cm: 50.0
  background_color: [0.0, 0.0, 0.0]

recording:
  ripple_enabled: false
  spikeglx_enabled: false
  lsl_enabled: true
  save_dir: "data"

task:  # required
  task_class: "hapticore.tasks.center_out.CenterOutTask"  # required
  params:
    target_radius: 0.02
    hold_time: 0.5
    reach_timeout: 2.0
  conditions:
    - target_angle: 0
      target_distance: 0.08
    - target_angle: 45
      target_distance: 0.08
    - target_angle: 90
      target_distance: 0.08
    - target_angle: 135
      target_distance: 0.08
    - target_angle: 180
      target_distance: 0.08
    - target_angle: 225
      target_distance: 0.08
    - target_angle: 270
      target_distance: 0.08
    - target_angle: 315
      target_distance: 0.08
  block_size: 8
  num_blocks: 20
  randomization: "pseudorandom"

sync:
  teensy_port: "/dev/ttyACM0"
  sync_pulse_rate_hz: 1.0
  event_code_bits: 8

zmq:
  event_pub_address: "ipc:///tmp/hapticore_events"
  haptic_state_address: "ipc:///tmp/hapticore_haptic_state"
  haptic_command_address: "ipc:///tmp/hapticore_haptic_cmd"
  transport: "ipc"
